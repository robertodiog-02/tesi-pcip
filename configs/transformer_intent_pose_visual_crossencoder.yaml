experiment:
  name: transformer_intent_model_last_token_again
  seed: 42

data:
  annotation_root: /Users/robertodioguardi/Desktop/PIE
  obs_len: 16
  bbox_normalization: image_based  # 'raw' or 'image_based'
  speed_normalization: raw      # 'raw' or 'divide'
  drop_first_frame: False          # Keep full 16 frames

  # ── POSIZIONE ASSOLUTA: use_bbox (model:) oppure use_polar ────────────────
  # Codificano la stessa informazione — dove si trova il pedone nel piano
  # immagine — in due sistemi di coordinate diversi, quindi al massimo UNA
  # delle due puo' essere attiva. Nessuna delle due e' pero' obbligatoria:
  # il modello gira anche senza posizione assoluta (es. solo ego_speed).
  # L'unico requisito e' che almeno UNA feature qualsiasi sia attiva.
  #
  # ── MOTO RELATIVO ALLA SCENA: use_pdm, indipendente ───────────────────────
  # Il PDM NON e' alternativo ai due sopra: si combina con entrambi.
  # Non dice dove si trova il pedone (le differenze temporali eliminano la
  # posizione assoluta), ma come si muove rispetto alle linee che delimitano
  # la ROI di attraversamento — piu' l'area ratio come proxy di profondita'.
  #
  # Combinazioni valide (con qualunque sottoinsieme di displacement/delta/speed):
  #   bbox                 (baseline)
  #   bbox  + pdm
  #   polar
  #   polar + pdm          (posizione polare + moto relativo + depth cue)
  #   pdm                  (senza posizione assoluta)
  #   nessuna delle tre    (solo displacement/delta/speed)
  # NON valida: bbox + polar insieme.

  # use_pdm — Position Decoupling Module (GTransPDM eq. 2)
  #   Linee A=(0,H)->B=(W/2,Ymin) e B->C=(W,H). Feature = differenze temporali
  #   della disparita' dalla linea + R=(A_t/A_{t-1}-1)*100.
  #   -> 3 feature (2 se pdm_use_area_ratio: false)
  use_pdm: false
  pdm_use_area_ratio: true
  # keep_absolute: tiene anche dx, dy ASSOLUTI oltre alle loro differenze.
  # GTransPDM deriva e butta via gli assoluti, quindi il PDM dice "mi sto
  # avvicinando alla linea" ma non "quanto sono vicino". Con true recuperi
  # anche quella informazione: 3 feature -> 5. Deviazione dal paper, ablabile.
  pdm_keep_absolute: false

  # use_polar — coordinate quasi-polari a tre poli (PCIP sez. III-D)
  #   Poli O1=(0,H), O2=(W/2,H), O3=(W,H). Per ciascuno (cos theta, dist).
  #   NOTA: PCIP seleziona dinamicamente il polo piu' vicino; qui usiamo TUTTI
  #   e tre, perche' la selezione dinamica crea discontinuita' temporali quando
  #   il polo cambia tra frame consecutivi.
  #   -> 6 feature (9 con sin, raddoppiate con deltas)
  use_polar: false
  polar_include_sin: false
  polar_add_deltas: false

  # Punto della bbox usato per PDM e polare:
  #   center | bottom_center (piedi, contatto col suolo) | top_left
  geom_anchor: center

  # ── Punto di riferimento per displacement e delta ─────────────────────────
  #   corners       : [x1,y1,x2,y2] — entrambi gli angoli (default storico).
  #                   4 dim. Contiene implicitamente traslazione E cambio di
  #                   scala, mescolati.
  #   center        : centro della box, 2 dim. E' la definizione di GTransPDM
  #                   per D_i e V_i: la traiettoria e' il moto del centro.
  #   center_size   : (cx, cy, w, h), 4 dim. Traslazione e scala separate
  #                   esplicitamente invece che mescolate negli angoli.
  #   bottom_center : piedi del pedone, 2 dim. Punto di contatto col suolo.
  displacement_type: corners
  delta_type: corners

  # ── Skeleton Pose Encoder (GTransPDM eq. 6-7) ─────────────────────────────
  # Pose estratte con HigherHRNet sulle crop dei pedoni: 17 keypoint COCO
  # (x, y, confidence) in pixel grezzi, un pickle per set in pose_dir.
  # L'allineamento finestra<->pose avviene per NUMERO DI FRAME.
  use_skeleton: false
  pose_dir: data/poses

  # Normalizzazione dei keypoint (GTransPDM: sottrazione del top-left bbox):
  #   bbox_topleft        : (x', y') = (x - x1, y - y1). Fedele al paper;
  #                         la scala resta in pixel.
  #   bbox_topleft_scaled : come sopra ma diviso per (w, h) -> ~[0,1],
  #                         invariante alla distanza. Deviazione ablabile.
  #   none                : keypoint grezzi.
  skeleton_norm: bbox_topleft

  # ── Cardinalita' dei keypoint ────────────────────────────────────────────
  # Le pose HigherHRNet sono COCO-17. I giunti aggiuntivi sono DERIVATI come
  # media dei punti adiacenti (stesso metodo di GTransPDM).
  #   none       : 17 COCO puri, solo giunti rilevati
  #   openpose18 : 18 = 17 COCO + collo (media delle spalle).
  #                Riproduce la topologia OpenPose-18 di Dual-STGAT; il collo
  #                e' stimato invece che rilevato, ma sta nella stessa
  #                posizione anatomica e ha gli stessi archi.
  #   gtranspdm  : 20 = 17 COCO + collo, anca, centro corpo (GTransPDM)
  #
  # Se omesso, il default segue l'encoder: stgat -> openpose18,
  # gtranspdm -> gtranspdm. Impostarlo esplicitamente permette di confrontare
  # i due encoder a PARITA' di input, che per un'ablation pulita e' meglio.
  skeleton_joints_mode: gtranspdm

  # ── Occlusioni (Dual-STGAT sez. III-D.1) ─────────────────────────────────
  # Quando il detector non rileva un keypoint:
  #   buco <= pose_max_gap frame  -> interpolazione lineare tra i frame validi
  #   buco >  pose_max_gap frame  -> coordinate azzerate a (0,0)
  # L'interpolazione e' PER GIUNTO: il detector puo' perdere 2 giunti su 17
  # in un frame, quindi il buco riguarda il singolo keypoint.
  # Un buco di 1-2 frame azzerato crea un salto a zero e ritorno, segnale
  # spurio peggiore di una posizione stimata.
  pose_interpolate: false
  pose_max_gap: 2                  # <= 2 frame = occlusione breve
  pose_interp_confidence: 0.5      # confidence dei punti interpolati: bassa,
                                   # cosi' il modello sa che sono stimati
  pose_conf_threshold: 0.0         # un giunto e' mancante se conf <= questa

  # ── Feature visive DINOv3 (rami CLS e ROI, indipendenti) ─────────────────
  # Richiedono l'estrazione con extract_dinov3_roi.py e la cartella feature.
  use_global_context: false        # CLS token: contesto globale della scena
  use_roi: false                   # ROI crop del pedone: contesto locale
  visual_feat_dir: features/dinov3
  roi_scale: 1.5                   # quale crop usare: 1.0 | 1.5 | 2.0
  roi_size: 3                      # quale griglia: 1 o 3 (deve essere estratta)
  visual_dim: 768                  # hidden_dim di DINOv3 (vitb16 = 768)

  sample_type: all

model:
  name: TransformerModalityNet
  hidden_dim: 64                  # d_model (dimensione embedding per frame)
  num_layers: 4                    # numero di layer Transformer Encoder
  nhead: 4                         # numero di attention heads (hidden_dim deve essere divisibile per nhead)
  dropout: 0.1
  # Pooling — come si collassa la dimensione temporale prima della testa:
  #   cls     : token CLS appreso (stile BERT/ViT)
  #   last    : ultimo token = frame piu' vicino all'evento
  #   mean    : global average pooling su tutti i token
  #   flatten   : concatena tutti i T token -> testa (GTransPDM eq. 9)
  #   attention : media pesata dei token, pesi appresi dal contenuto
  pooling: last

  # Testa di classificazione: 1 = singolo Linear (comportamento originale),
  # >1 = MLP con ReLU+dropout. Conta soprattutto con pooling: flatten, dove
  # l'input e' T*hidden_dim (1024 con T=16, d=64) e un solo Linear e' una
  # regressione lineare sui token concatenati.
  head_layers: 1
  head_hidden: null        # null -> usa hidden_dim
  head_dropout: 0.1

  # Fusione delle modalita':
  #   false : fusione piatta — bbox, displacement, delta E speed proiettati,
  #           concatenati e riproiettati tutti insieme (comportamento attuale)
  #   true  : fusione gerarchica stile GTransPDM —
  #             X_pe = FC(Concat[FC(bbox), FC(disp), FC(delta)])   (eq. 3)
  #             X_ev = FC(FC(speed))                               (eq. 5)
  #             x    = FC(Concat[X_pe, X_ev])                      (eq. 8)
  #           la cinematica del pedone e il moto dell'ego restano separati
  separate_encoder_speed_kinematics: false

  # Pre-LN: LayerNorm PRIMA di attention/FFN dentro ogni layer del Transformer,
  # invece che dopo (Post-LN, default PyTorch). Generalmente piu' stabile su
  # dataset piccoli e reti addestrate da zero.
  norm_first: false

  # LayerNorm applicata alla sequenza subito prima del Transformer (dopo il
  # positional encoding). Utile quando le feature hanno scale molto diverse
  # tra loro (bbox in [0,1], displacement in pixel, speed in km/h).
  use_input_layernorm: false

  # ── Skeleton Pose Encoder (attivo solo se use_skeleton sotto `data:`) ────
  # gtranspdm : GTransPDM eq. 6-7 — 4 blocchi GCN, adiacenza anatomica unica,
  #             edge importance apprendibile, residui Conv2D.
  # stgat     : Pose-STGAT di Dual-STGAT (Lian et al. 2025) — adiacenza
  #             PARTIZIONATA in 3 gruppi (root/centripeto/centrifugo) con pesi
  #             distinti, VELOCITY ATTENTION (la velocita' dell'ego modula
  #             channel-wise le feature della posa), TCN lungo il tempo.
  skeleton_encoder: gtranspdm

  # parametri di "gtranspdm"
  skeleton_hidden: 64
  skeleton_layers: 4

  # ── riduzione del crop ROI 3x3 -> vettore (solo se use_roi) ──
  roi_reduce: flatten              # flatten (S*S*768->Linear) | mean (media celle)
  visual_dropout: 0.1

  # ── Cross-Modal Encoder (PedFormer): attention a coppie tra modalita' ─────
  # PRIMA della fusione, ogni modalita' interroga le altre lungo il tempo.
  #   off           : disattivato (fusione diretta)
  #   full          : ogni modalita' interroga TUTTE le altre (O(m^2), pesante)
  #   to_kinematics : le modalita' non-cinematiche interrogano la cinematica
  #                   e viceversa, saltando le coppie ridondanti (piu' leggero)
  cross_modal: off
  cross_modal_heads: 4

  # parametri di "stgat" — il paper usa 3 layer con canali 32,64,64
  stgat_channels: [32, 64, 64]
  stgat_kt: 9                      # kernel temporale del TCN
  stgat_velocity: true             # velocity attention.
                                   # NOTA: con true la velocita' entra sia
                                   # dentro la posa sia (se use_ego_speed)
                                   # come ramo separato. Per restare fedeli a
                                   # Dual-STGAT metti use_ego_speed: false.

  # Posizione assoluta cartesiana della bbox [x1,y1,x2,y2].
  # Incompatibile con use_polar (sotto `data:`), ma non obbligatoria:
  # puo' stare a false senza attivare nulla al suo posto.
  # use_pdm invece si combina liberamente, non sostituisce.
  use_bbox: true

  use_bbox_displacement: true
  use_bbox_delta: false
  use_ego_speed: true

training:
  epochs: 40
  batch_size: 16
  lr: 5.0e-5
  weight_decay: 0.0001
  patience: 60
  scheduler: none
  # ── Validation ───────────────────────────────────────────────────────────
  # use_val_from_train: true -> il validation e' una fetta del TRAIN
  #   (N pedoni campionati in modo STRATIFICATO, split PER PEDONE cosi'
  #    nessuna finestra dello stesso pedone finisce in entrambi).
  #   Gli ID sono salvati in val_split_file e RIUSATI nei run successivi,
  #   cosi' tutti gli esperimenti selezionano il modello sullo stesso val.
  #   Ha la precedenza su use_validation.
  # Se false, vale use_validation:
  #   true  -> validation ufficiale PIE
  #   false -> nessun validation (addestra tutte le epoche, salva l'ultima)
  use_val_from_train: false
  val_split_file: data/val_split.json
  val_n_peds: 80
  val_split_seed: 42
  val_stratified: true             # false = campionamento uniforme (sconsigliato:
                                   # su 80 pedoni la quota di crossing oscilla molto)

  use_validation: false            # Allineato a benchmark_singlernn per addestrare sul dataset completo

  # Class weights della loss: [w_neg, w_pos].
  # Con BCE viene usato come pos_weight = w_pos / w_neg.
  class_weights:
    - 1.0
    - 3.0

output:
  checkpoint_dir: checkpoints
  log_dir: logs